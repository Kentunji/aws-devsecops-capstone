name: Deploy URL Shortener

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: capstone-url-shortener
  ECS_CLUSTER: capstone-cluster
  ECS_SERVICE: capstone-service
  TASK_FAMILY: capstone-url-shortener

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt

      - name: Run tests (safety gate)
        working-directory: app
        run: python -m pytest test_app.py -v

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::320408143639:role/capstone-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image (SHA tagged)
        id: build
        working-directory: app
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production          # <-- THIS triggers the manual approval gate
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::320408143639:role/capstone-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy new image to ECS
        env:
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          aws ecs describe-task-definition --task-definition $TASK_FAMILY \
            --query 'taskDefinition' --output json > taskdef.json

          python3 - << 'PY'
          import json, os
          d = json.load(open("taskdef.json"))
          for k in ["taskDefinitionArn","revision","status","requiresAttributes",
                    "compatibilities","registeredAt","registeredBy"]:
              d.pop(k, None)
          d["containerDefinitions"][0]["image"] = os.environ["IMAGE"]
          json.dump(d, open("taskdef-new.json","w"))
          PY

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $NEW_ARN"

          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE \
            --task-definition "$NEW_ARN"
